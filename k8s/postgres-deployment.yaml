apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  labels:
    app: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: "webapp_db"
            - name: POSTGRES_USER
              value: "webapp"
            - name: POSTGRES_PASSWORD
              value: "webapp_pass"
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "webapp", "-d", "webapp_db"]
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 10
